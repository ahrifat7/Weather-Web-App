<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>WeatherPulse | Real-time Weather Insights</title>

  <link rel="icon" type="image/x-icon" href="icons/favicon.ico">

  <link rel="stylesheet" href="styles/style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
</head>

<body>
  <div class="bg-overlay"></div>

  <header>
    <nav class="navbar">
      <div class="nav-brand">
        <a href="#" class="repo-link">
          <span class="brand-emoji">🥶</span>
          <span class="brand-text">WeatherPulse</span>
        </a>
      </div>
      <div class="nav-actions">
        <div class="search-wrapper">
          <input spellcheck="false" class="search-city" id="searchCity" type="text" autocomplete="off" placeholder="Search City...">
          <span class="search-icon">🔍</span>
        </div>
        <div class="action-buttons">
          <a id="resetBtn" title="Reset" href="#">⟳</a>
          <a href="#" title="Favorites">☆</a>
          <div class="dropdown">
            <button id="settingsBtn" class="dropdown-toggle" title="Settings">•••</button>
            <div id="settingsDropdown" class="dropdown-content">
              <a href="https://github.com/ahrifat7/WeatherPulse" target="_blank">
                <span class="icon">📁</span> Source Code
              </a>
              <a href="https://www.linkedin.com/in/abdul-halim-bd/" target="_blank">
                <span class="icon">👤</span> Contact
              </a>
            </div>
          </div>
        </div>
      </div>
    </nav>

    <div class="mobile-search-container">
      <input spellcheck="false" class="mobile-search-city" id="mobileSearchCity" type="text" autocomplete="off" placeholder="Search City...">
    </div>
  </header>

  <main class="content-wrapper">
    <section class="main-weather">
      <div class="location-container">
        <h1 class="location-name" id="locationName">Search City...</h1>
        <p class="weather-type" id="weatherType"></p>
      </div>

      <div class="temperature-container">
        <div class="temperature-icon">
          <img class="imgs-as-icons" src="icons/sunny.png" alt="Weather Icon">
        </div>
        <div class="temperature-value" id="temperatureValue"></div>
      </div>
    </section>

    <section class="details-section">
      <div class="details-grid">
        <div class="detail-card">
          <span class="detail-label">Air Quality</span>
          <span class="detail-value" id="airQualityValue">Moderate</span>
        </div>
        <div class="detail-card">
          <span class="detail-label">Real Feel</span>
          <span class="detail-value" id="realFeelAdditionalValue">-</span>
        </div>
        <div class="detail-card">
          <span class="detail-label">Humidity</span>
          <span class="detail-value" id="humidityAdditionalValue">-</span>
        </div>
        <div class="detail-card">
          <span class="detail-label">Max Temp</span>
          <span class="detail-value" id="maxTemperatureAdditionalValue">-</span>
        </div>
        <div class="detail-card">
          <span class="detail-label">Min Temp</span>
          <span class="detail-value" id="minTemperatureAdditionalValue">-</span>
        </div>
        <div class="detail-card">
          <span class="detail-label">Wind Speed</span>
          <span class="detail-value" id="windSpeedAdditionalValue">-</span>
        </div>
        <div class="detail-card">
          <span class="detail-label">Wind Direction</span>
          <span class="detail-value" id="windDirectionAdditionalValue">-</span>
        </div>
        <div class="detail-card">
          <span class="detail-label">Visibility</span>
          <span class="detail-value" id="visibilityAdditionalValue">-</span>
        </div>
        <div class="detail-card">
          <span class="detail-label">Pressure</span>
          <span class="detail-value" id="pressureAdditionalValue">-</span>
        </div>
        <div class="detail-card">
          <span class="detail-label">Sunrise</span>
          <span class="detail-value" id="sunriseAdditionalValue">-</span>
        </div>
        <div class="detail-card">
          <span class="detail-label">Sunset</span>
          <span class="detail-value" id="sunsetAdditionalValue">-</span>
        </div>
      </div>
    </section>

    <section class="forecast-section">
      <h2 class="forecast-label">Daily Forecast</h2>
      <div id="forecast-container" class="forecast-grid"></div>
    </section>
  </main>

  <footer>
    <div class="footer-pill">
      <span class="dev-emoji">🚀</span>
      Design and developed by <a href="https://abdul-halim-rifat.vercel.app/" target="_blank">A.H. Rifat @ SuperDev</a>
    </div>
  </footer>

  <script src="scripts/script.js"></script>
  <script src="scripts/mobile.js"></script>
</body>

</html>
